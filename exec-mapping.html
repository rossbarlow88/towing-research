d the national network of 30,000+ towing service providers; Prior at ACI Worldwide as Global VP Customer Care, and Intuit", "yoe": "", "email": "", "mobile": "", "linkedin": "", "education": "MBA from Oklahoma State", "qualifications": "", "relevance": "Medium", "fit_rationale": "Has run the largest towing dispatch network operations in the country and understands provider quality, network economics, and the gap between aggregation and operator ownership. Ideal advisory perspective for a PE-backed towing platform.", "category": "adjacent-operator", "date_added": "March 20, 2026", "source_added": "Research", "source": "Research", "background_summary": "Former SVP Operations at Agero (2014+), where he oversaw 7.5mm+ emergency requests annually and managed the national network of 30,000+ towing service providers; Prior at ACI Worldwide as Global VP Customer Care, and Intuit", "tab": "advisory", "tab_label": "Advisory & Adjacent"}, {"name": "Chris Mantas", "gender": "Male", "function": "Finance", "location": "Salt Lake City, UT", "title": "CEO", "company": "Genos Capital (Salt Lake City, UT)", "prev_exp": "", "yoe": "", "email": "", "mobile": "", "linkedin": "", "education": "", "qualifications": "", "relevance": "Medium", "fit_rationale": "One of the very few PE investors who has actually tried to build a towing roll-up. Has direct lessons from the Genos/Kratos attempt — what integration looks like, where the challenges are, what type of operators engage. Call it competitive intelligence plus a potential co-investor.", "category": "functional-talent", "date_added": "March 20, 2026", "source_added": "Research", "source": "Research", "background_summary": "", "tab": "advisory", "tab_label": "Advisory & Adjacent"}, {"name": "Jerry Carnahan", "gender": "Male", "function": "Corporate Development", "location": "", "title": "Former CEO", "company": "AutoReturn (pre-Autura rebrand) — departed 2023", "prev_exp": "", "yoe": "", "email": "", "mobile": "", "linkedin": "", "education": "", "qualifications": "", "relevance": "Low", "fit_rationale": "Former CEO of the largest government-facing towing software platform. Deep knowledge of municipal towing contract dynamics, operator RFP processes, and city towing management economics.", "category": "towing-executive", "date_added": "March 20, 2026", "source_added": "Research", "source": "Research", "background_summary": "", "tab": "advisory", "tab_label": "Advisory & Adjacent"}];

const TABS = [
  { key: "all", label: "All" },
  { key: "current", label: "Current" },
  { key: "former", label: "Former" },
  { key: "advisory", label: "Advisory & Adjacent" },
];

let activeTab = "all";
let sortCol = null;
let sortAsc = true;

const VISIBLE_COLS = [
  { key: "name", label: "Name", w: "160px" },
  { key: "title", label: "Title", w: "150px" },
  { key: "company", label: "Company", w: "180px" },
  { key: "location", label: "Location", w: "140px" },
  { key: "function", label: "Function", w: "120px" },
  { key: "yoe", label: "Exp", w: "70px" },
  { key: "relevance", label: "Relevance", w: "80px" },
  { key: "source_added", label: "Source", w: "90px" },
  { key: "linkedin", label: "LinkedIn", w: "80px" },
];

function init() {
  renderTabs();
  renderMetrics();
  renderHeader();
  renderTable();
  document.getElementById("search").addEventListener("input", renderTable);
  document.getElementById("filterRelevance").addEventListener("change", renderTable);
  document.getElementById("filterCategory").addEventListener("change", renderTable);
}

function renderTabs() {
  const el = document.getElementById("tabs");
  el.innerHTML = TABS.map(t => {
    const count = t.key === "all" ? DATA.length : DATA.filter(d => d.tab === t.key).length;
    return `<button class="tab-btn ${activeTab === t.key ? 'active' : ''}" onclick="setTab('${t.key}')">${t.label}<span class="count">${count}</span></button>`;
  }).join("");
}

function renderMetrics() {
  const total = DATA.length;
  const high = DATA.filter(d => d.relevance === "High").length;
  const withLinkedin = DATA.filter(d => d.linkedin).length;
  const withEmail = DATA.filter(d => d.email).length;
  const withRationale = DATA.filter(d => d.fit_rationale).length;
  document.getElementById("metrics").innerHTML = `
    <div class="metric-card"><div class="metric-val">${total}</div><div class="metric-label">Total Operators</div></div>
    <div class="metric-card green"><div class="metric-val">${high}</div><div class="metric-label">High Relevance</div></div>
    <div class="metric-card amber"><div class="metric-val">${withRationale}</div><div class="metric-label">With Fit Rationale</div></div>
    <div class="metric-card gray"><div class="metric-val">${withLinkedin}</div><div class="metric-label">LinkedIn Profiles</div></div>
    <div class="metric-card"><div class="metric-val">${withEmail}</div><div class="metric-label">Email Available</div></div>
  `;
}

function renderHeader() {
  document.getElementById("thead").innerHTML = `<tr>${VISIBLE_COLS.map((c, i) =>
    `<th style="width:${c.w}" onclick="toggleSort('${c.key}')" class="${sortCol===c.key?'sorted':''}">${c.label}<span class="sort-arrow">${sortCol===c.key?(sortAsc?'\u25B2':'\u25BC'):'\u25B2'}</span></th>`
  ).join("")}</tr>`;
}

function getFiltered() {
  const q = document.getElementById("search").value.toLowerCase();
  const rel = document.getElementById("filterRelevance").value;
  const cat = document.getElementById("filterCategory").value;
  let rows = DATA;
  if (activeTab !== "all") rows = rows.filter(r => r.tab === activeTab);
  if (q) rows = rows.filter(r => (r.name+r.company+r.location+r.title+r.function+r.category+(r.fit_rationale||"")+(r.source_added||"")).toLowerCase().includes(q));
  if (rel) rows = rows.filter(r => r.relevance === rel);
  if (cat) rows = rows.filter(r => r.category === cat);
  if (sortCol) {
    rows = [...rows].sort((a, b) => {
      let va = (a[sortCol]||"").toString().toLowerCase();
      let vb = (b[sortCol]||"").toString().toLowerCase();
      if (sortCol === "relevance") {
        const order = {"high":0,"medium":1,"low":2};
        va = order[va] ?? 3; vb = order[vb] ?? 3;
      }
      return sortAsc ? (va<vb?-1:va>vb?1:0) : (va>vb?-1:va<vb?1:0);
    });
  }
  return rows;
}

function renderTable() {
  const rows = getFiltered();
  const tbody = document.getElementById("tbody");
  const nr = document.getElementById("noResults");
  if (!rows.length) { tbody.innerHTML = ""; nr.style.display = "block"; return; }
  nr.style.display = "none";

  tbody.innerHTML = rows.map((r, i) => {
    const relBadge = `<span class="badge badge-${r.relevance.toLowerCase()}">${r.relevance}</span>`;
    const srcClass = r.source_added === "Both" ? "both" : (r.source_added === "Research" ? "research" : "reference");
    const srcBadge = `<span class="badge badge-source badge-${srcClass}">${r.source_added || 'Reference Excel'}</span>`;
    const liLink = r.linkedin ? `<a href="${r.linkedin}" target="_blank" class="linkedin-link" onclick="event.stopPropagation()">Profile</a>` : '<span style="color:#ccc">\u2014</span>';

    const mainRow = `<tr onclick="toggleDetail(${i})" data-idx="${i}">
      <td><strong>${r.name}</strong></td>
      <td>${r.title}</td>
      <td>${r.company}</td>
      <td>${r.location}</td>
      <td>${r.function}</td>
      <td>${r.yoe}</td>
      <td>${relBadge}</td>
      <td>${srcBadge}</td>
      <td>${liLink}</td>
    </tr>`;

    const detailRow = `<tr class="detail-row" id="detail-${i}">
      <td colspan="${VISIBLE_COLS.length}">
        <div class="detail-grid">
          <div class="detail-section">
            <h4>Fit Rationale</h4>
            <p>${r.fit_rationale || '<em>No fit rationale available</em>'}</p>
          </div>
          <div class="detail-section">
            <h4>Background / Previous Experience</h4>
            <p>${r.background_summary || r.prev_exp || '<em>No detailed background available</em>'}</p>
          </div>
          <div class="detail-section">
            <h4>Contact</h4>
            <p>${r.email ? 'Email: '+r.email : ''}<br>${r.mobile ? 'Mobile: '+r.mobile : ''}<br>${r.linkedin ? '<a href="'+r.linkedin+'" target="_blank">LinkedIn Profile</a>' : ''}</p>
          </div>
          <div class="detail-section">
            <h4>Details</h4>
            <p>Category: ${(r.category||'\u2014').replace(/-/g,' ')}<br>Education: ${r.education||'\u2014'}<br>Qualifications: ${r.qualifications||'\u2014'}<br>Date Added: ${r.date_added||'\u2014'}<br>Source: ${r.source_added||'\u2014'}<br>Tab: ${r.tab_label}</p>
          </div>
        </div>
      </td>
    </tr>`;

    return mainRow + detailRow;
  }).join("");
}

function setTab(key) {
  activeTab = key;
  renderTabs();
  renderTable();
}

function toggleSort(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  renderHeader();
  renderTable();
}

function toggleDetail(idx) {
  const el = document.getElementById("detail-" + idx);
  if (!el) return;
  const isOpen = el.classList.contains("open");
  document.querySelectorAll(".detail-row.open").forEach(e => e.classList.remove("open"));
  if (!isOpen) el.classList.add("open");
}

init();
</script>
</body>
</html>
